name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-pack:
    runs-on: ubuntu-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore solution
        run: dotnet restore nuget-trivia.sln

      - name: Build solution
        run: dotnet build nuget-trivia.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test nuget-trivia.sln --configuration Release --no-build --verbosity minimal

      - name: Pack packages
        run: dotnet pack nuget-trivia.sln --configuration Release --no-build --verbosity minimal --output ./artifacts/packages

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error

      - name: Publish NuGet packages
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v') && env.NUGET_API_KEY != ''
        run: dotnet nuget push artifacts/packages/*.nupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish NuGet symbol packages
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v') && env.NUGET_API_KEY != ''
        run: dotnet nuget push artifacts/packages/*.snupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
